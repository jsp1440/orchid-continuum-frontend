name: Featured Genus Render Sentinel

on:
  workflow_dispatch:
  schedule:
    - cron: '23 14 * * *'

permissions:
  contents: read
  issues: write

jobs:
  audit-deployed-featured-genus:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FRONTEND_URL: https://orchid-continuum-frontend-vof6.onrender.com/
      CALYX_URL: https://orchid-calyx-backend.onrender.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          npm install --no-save --no-package-lock playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Run deployed browser audit
        run: node scripts/featured-genus-render-sentinel.mjs
      - name: Preserve audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: featured-genus-render-sentinel
          path: artifacts/
          if-no-files-found: warn
      - name: Create or update one active incident
        if: failure()
        run: |
          title="Sentinel: Featured Genus deployment audit failing"
          body="The deployed Featured Genus audit failed. See workflow run $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID and artifact featured-genus-render-sentinel."
          issue_number=$(gh issue list --state open --search "in:title $title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)
          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
